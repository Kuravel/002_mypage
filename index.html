<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, World!!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* 背景の星 */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.5); }
    }

    /* グロー背景 */
    .glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float var(--fd, 8s) ease-in-out infinite var(--fdelay, 0s) alternate;
    }

    .glow-orb:nth-child(1) {
      width: 500px; height: 500px;
      background: #6c63ff;
      top: -100px; left: -100px;
      --fd: 9s;
    }
    .glow-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: #ff6b9d;
      bottom: -80px; right: -80px;
      --fd: 11s; --fdelay: -3s;
    }
    .glow-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: #00d4ff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      --fd: 7s; --fdelay: -1.5s;
    }

    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* メインコンテナ */
    .container {
      position: relative;
      text-align: center;
      z-index: 10;
    }

    /* グラスモーフィズムカード */
    .card {
      padding: 64px 80px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 40px 80px rgba(0,0,0,0.5);
      animation: appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    /* ラベル */
    .label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
      animation: appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    /* メインテキスト */
    .hello {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(
        135deg,
        #fff 0%,
        #a8a8ff 30%,
        #ff6b9d 60%,
        #00d4ff 100%
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation:
        appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both,
        gradient-shift 6s ease-in-out infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    /* 区切り線 */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      margin: 28px auto;
      animation: appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    /* サブテキスト */
    .sub {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.35);
      animation: appear 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
    }

    /* カーソル点滅 */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: rgba(255,255,255,0.5);
      margin-left: 4px;
      vertical-align: middle;
      border-radius: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 星 -->
  <div class="stars" id="stars"></div>

  <!-- グロー背景 -->
  <div class="glow-bg">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
  </div>

  <!-- メイン -->
  <div class="container">
    <div class="card">
      <div class="label">Welcome to the universe</div>
      <div class="hello">Hello, World!!</div>
      <div class="divider"></div>
      <div class="sub">Every great journey begins with a single line<span class="cursor"></span></div>
    </div>
  </div>

  <script>
    // 星を生成
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --d: ${2 + Math.random() * 4}s;
        --delay: ${-Math.random() * 6}s;
        width: ${Math.random() < 0.2 ? 3 : 2}px;
        height: ${Math.random() < 0.2 ? 3 : 2}px;
      `;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
